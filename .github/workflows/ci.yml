name: CI

on:
  push:
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        # --ignore-scripts: skip install lifecycle scripts (postinstall news
        # clone, prepare → husky + playwright install). `playwright install`
        # is unbounded and hangs CI for the full 6h job timeout (issue #329);
        # none of these are needed to lint.
        run: npm ci --ignore-scripts
      - name: Run ESLint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    env:
      CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
      CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        # --ignore-scripts: skip install lifecycle scripts that hang CI (#329).
        # News content is still fetched: `npm run build` runs the `prebuild`
        # script (scripts/fetch-news-content.mjs) before `next build`.
        run: npm ci --ignore-scripts
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx', '**/*.json', '!node_modules/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          path: .next
          include-hidden-files: true
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        # --ignore-scripts: skip install lifecycle scripts that hang CI (#329).
        # Unit tests need neither news content, husky, nor browsers.
        run: npm ci --ignore-scripts
      - name: Run Unit Tests
        run: npm run test

  e2e:
    needs: build
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
      CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache node_modules
        id: npm-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        # --ignore-scripts: skip install lifecycle scripts that hang CI (#329).
        # Browsers are installed by the explicit "Install Playwright Browsers"
        # step below, and `npm start` serves the prebuilt .next artifact (news
        # content is already baked into the static pages at build time).
        run: npm ci --ignore-scripts
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
          path: .next
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
